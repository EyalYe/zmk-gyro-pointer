# dts/bindings/input/zmk,mpu6050-input.yaml
description: MPU6050 gyro-to-pointer glue
compatible: "zmk,mpu6050-input"

properties:
  sensor:
    type: phandle
    required: true
  poll-interval-ms:
    type: int
    default: 10
  scale-mult:
    type: int
    default: 1
    description: |
      Pointer counts per poll = gyro rate (milli-rad/s) * scale-mult / scale-div.
  scale-div:
    type: int
    default: 1
    description: |
      See scale-mult. The MPU6050's default +-250 deg/s full scale tops out
      around 4363 milli-rad/s, so e.g. scale-div 200 gives at most ~21
      counts per poll.
  layers:
    type: array
    required: false
    description: |
      If set, the gyro is only polled while at least one of these layers
      is active; on all other layers polling stops entirely (saves power
      and suppresses pointer motion). Omit to poll on every layer.
  swap-xy:
    type: boolean
  invert-x:
    type: boolean
  invert-y:
    type: boolean
